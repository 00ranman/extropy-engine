version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════════
# Extropy Engine — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: extropy
      POSTGRES_PASSWORD: extropy_dev
      POSTGRES_DB: extropy_engine
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U extropy']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Services ─────────────────────────────────────────────────────────────────────
  epistemology-engine:
    build:
      context: .
      dockerfile: packages/epistemology-engine/Dockerfile
    environment:
      DATABASE_URL: postgresql://extropy:extropy_dev@postgres:5432/extropy_engine
      REDIS_URL: redis://redis:6379
      PORT: '4001'
    ports:
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  signal-flow:
    build:
      context: .
      dockerfile: packages/signal-flow/Dockerfile
    environment:
      DATABASE_URL: postgresql://extropy:extropy_dev@postgres:5432/extropy_engine
      REDIS_URL: redis://redis:6379
      EPISTEMOLOGY_URL: http://epistemology-engine:4001
      PORT: '4002'
    ports:
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      epistemology-engine:
        condition: service_started

  loop-ledger:
    build:
      context: .
      dockerfile: packages/loop-ledger/Dockerfile
    environment:
      DATABASE_URL: postgresql://extropy:extropy_dev@postgres:5432/extropy_engine
      REDIS_URL: redis://redis:6379
      EPISTEMOLOGY_URL: http://epistemology-engine:4001
      REPUTATION_URL: http://reputation:4004
      XP_MINT_URL: http://xp-mint:4005
      PORT: '4003'
    ports:
      - '4003:4003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      epistemology-engine:
        condition: service_started

  reputation:
    build:
      context: .
      dockerfile: packages/reputation/Dockerfile
    environment:
      DATABASE_URL: postgresql://extropy:extropy_dev@postgres:5432/extropy_engine
      REDIS_URL: redis://redis:6379
      EPISTEMOLOGY_URL: http://epistemology-engine:4001
      LOOP_LEDGER_URL: http://loop-ledger:4003
      PORT: '4004'
    ports:
      - '4004:4004'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  xp-mint:
    build:
      context: .
      dockerfile: packages/xp-mint/Dockerfile
    environment:
      DATABASE_URL: postgresql://extropy:extropy_dev@postgres:5432/extropy_engine
      REDIS_URL: redis://redis:6379
      EPISTEMOLOGY_URL: http://epistemology-engine:4001
      REPUTATION_URL: http://reputation:4004
      PORT: '4005'
    ports:
      - '4005:4005'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
