version: '3.9'

# ══════════════════════════════════════════════════════════════════════════════
# Extropy Engine — Docker Compose
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: extropy
      POSTGRES_PASSWORD: extropy
      POSTGRES_DB: extropy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U extropy']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Services ─────────────────────────────────────────────────────────────────

  epistemology-engine:
    build:
      context: .
      dockerfile: packages/epistemology-engine/Dockerfile
    restart: unless-stopped
    environment:
      PORT: '4001'
      DATABASE_URL: postgres://extropy:extropy@postgres:5432/extropy
      REDIS_URL: redis://redis:6379
    ports:
      - '4001:4001'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  signalflow:
    build:
      context: .
      dockerfile: packages/signalflow/Dockerfile
    restart: unless-stopped
    environment:
      PORT: '4002'
      DATABASE_URL: postgres://extropy:extropy@postgres:5432/extropy
      REDIS_URL: redis://redis:6379
    ports:
      - '4002:4002'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  loop-ledger:
    build:
      context: .
      dockerfile: packages/loop-ledger/Dockerfile
    restart: unless-stopped
    environment:
      PORT: '4003'
      DATABASE_URL: postgres://extropy:extropy@postgres:5432/extropy
      REDIS_URL: redis://redis:6379
    ports:
      - '4003:4003'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  xp-mint:
    build:
      context: .
      dockerfile: packages/xp-mint/Dockerfile
    restart: unless-stopped
    environment:
      PORT: '4005'
      DATABASE_URL: postgres://extropy:extropy@postgres:5432/extropy
      REDIS_URL: redis://redis:6379
    ports:
      - '4005:4005'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  reputation:
    build:
      context: .
      dockerfile: packages/reputation/Dockerfile
    restart: unless-stopped
    environment:
      PORT: '4004'
      DATABASE_URL: postgres://extropy:extropy@postgres:5432/extropy
      REDIS_URL: redis://redis:6379
    ports:
      - '4004:4004'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  postgres_data:
