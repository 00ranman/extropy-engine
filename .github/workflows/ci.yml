name: Extropy Engine CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test Monorepo
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --if-present run build
      - run: pnpm -r --if-present run test

  ethics-validation:
    name: Ethics Package Validation
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./packages/ethics test

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Full-workspace type check via project references (tsc --noEmit).
      # This catches type errors independently of the build/emit step and
      # guards against suppressions (@ts-nocheck/@ts-ignore) silently
      # disabling checking, which previously hid real bugs.
      - run: pnpm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --if-present run lint

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [homeflow, xp-mint, signalflow, dag-substrate, credentials]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          if [ -f packages/${{ matrix.service }}/Dockerfile ]; then
            docker build -t extropy/${{ matrix.service }}:${{ github.sha }} \
              -f packages/${{ matrix.service }}/Dockerfile \
              .
          else
            echo "No Dockerfile found for ${{ matrix.service }}, skipping"
          fi
