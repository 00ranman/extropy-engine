name: Extropy Engine CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test Monorepo
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm test --workspaces --if-present
      - run: npm run build --workspaces --if-present

  ethics-validation:
    name: Ethics Package Validation
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install
      - run: npm test --workspace=packages/ethics

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install
      - run: npm run lint --workspaces --if-present

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [homeflow, xp-mint, signalflow, dag-substrate, credentials]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t extropy/${{ matrix.service }}:${{ github.sha }} \
            -f packages/${{ matrix.service }}/Dockerfile \
            packages/${{ matrix.service }}
