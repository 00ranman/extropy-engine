openapi: 3.1.0
info:
  title: Loop Ledger API
  description: |
    Immutable append-only audit log for all claim validation events.
    Every state transition, verdict, and Bayesian update is recorded
    here with cryptographic integrity.
    
    The Loop Ledger is the source of truth for the entire Extropy Engine —
    once an entry is written, it cannot be modified or deleted.
  version: 1.0.0
  contact:
    name: Extropy Engine

servers:
  - url: http://localhost:4004
    description: Local development
  - url: https://api.extropy.engine/loop-ledger
    description: Production

tags:
  - name: Entries
    description: Ledger entry management
  - name: Audit
    description: Audit trail queries
  - name: Integrity
    description: Cryptographic integrity verification
  - name: Health
    description: Service health checks

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceHealthResponse'

  /entries:
    post:
      tags: [Entries]
      operationId: appendEntry
      summary: Append a new ledger entry
      description: |
        Appends an immutable entry to the ledger. Each entry is linked
        to its predecessor via hash chain, ensuring tamper-evidence.
        
        This endpoint is idempotent on `eventId` — duplicate events
        are silently ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendEntryRequest'
      responses:
        '201':
          description: Entry appended to ledger
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerEntryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

    get:
      tags: [Entries]
      operationId: listEntries
      summary: List ledger entries
      parameters:
        - name: claimId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by claim ID
        - name: eventType
          in: query
          schema:
            $ref: '#/components/schemas/EventType'
          description: Filter by event type
        - name: actorId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by actor
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Entries after this timestamp
        - name: until
          in: query
          schema:
            type: string
            format: date-time
          description: Entries before this timestamp
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of ledger entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerEntryListResponse'

  /entries/{entryId}:
    get:
      tags: [Entries]
      operationId: getEntry
      summary: Get a specific ledger entry
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: Ledger entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerEntryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /audit/claims/{claimId}:
    get:
      tags: [Audit]
      operationId: getClaimAuditTrail
      summary: Get complete audit trail for a claim
      description: |
        Returns all ledger entries for a claim in chronological order,
        showing every state transition and validation event.
      parameters:
        - name: claimId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Complete audit trail for the claim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditTrailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /audit/actors/{actorId}:
    get:
      tags: [Audit]
      operationId: getActorAuditTrail
      summary: Get audit trail for a specific actor
      description: |
        Returns all actions performed by a specific validator or system actor.
      parameters:
        - name: actorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        '200':
          description: Actor audit trail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditTrailResponse'

  /integrity/verify:
    post:
      tags: [Integrity]
      operationId: verifyIntegrity
      summary: Verify ledger integrity
      description: |
        Verifies the hash chain integrity for a range of entries.
        Detects any tampering or corruption in the ledger.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyIntegrityRequest'
      responses:
        '200':
          description: Integrity verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrityVerificationResponse'

  /integrity/hash/{entryId}:
    get:
      tags: [Integrity]
      operationId: getEntryHash
      summary: Get cryptographic hash for an entry
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: Entry hash details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryHashResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Duplicate event ID
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    EventType:
      type: string
      enum:
        - claim.submitted
        - claim.decomposed
        - claim.evaluated
        - claim.validated
        - claim.rejected
        - claim.disputed
        - subclaim.created
        - subclaim.assigned
        - subclaim.validated
        - subclaim.rejected
        - task.created
        - task.claimed
        - task.completed
        - task.expired
        - prior.initialized
        - prior.updated
        - validator.registered
        - validator.scored

    AppendEntryRequest:
      type: object
      required: [eventId, eventType, claimId, actorId, payload]
      properties:
        eventId:
          type: string
          format: uuid
          description: Idempotency key — duplicate eventIds are ignored
        eventType:
          $ref: '#/components/schemas/EventType'
        claimId:
          type: string
          format: uuid
          description: The claim this event relates to
        actorId:
          type: string
          format: uuid
          description: The validator, system, or user who triggered this event
        subClaimId:
          type: string
          format: uuid
          nullable: true
          description: Optional sub-claim reference
        taskId:
          type: string
          format: uuid
          nullable: true
          description: Optional task reference
        payload:
          type: object
          additionalProperties: true
          description: Event-specific data
        metadata:
          type: object
          additionalProperties: true
          description: Optional additional context

    LedgerEntryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sequenceNumber:
          type: integer
          description: Monotonically increasing sequence number
        eventId:
          type: string
          format: uuid
        eventType:
          $ref: '#/components/schemas/EventType'
        claimId:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
        subClaimId:
          type: string
          format: uuid
          nullable: true
        taskId:
          type: string
          format: uuid
          nullable: true
        payload:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        hash:
          type: string
          description: SHA-256 hash of this entry's content
        previousHash:
          type: string
          nullable: true
          description: Hash of the previous entry (null for genesis)
        timestamp:
          type: string
          format: date-time

    LedgerEntryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LedgerEntryResponse'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    AuditTrailResponse:
      type: object
      properties:
        entityId:
          type: string
          format: uuid
          description: The claim or actor ID this trail belongs to
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LedgerEntryResponse'
        totalEvents:
          type: integer
        firstEvent:
          type: string
          format: date-time
          nullable: true
        lastEvent:
          type: string
          format: date-time
          nullable: true

    VerifyIntegrityRequest:
      type: object
      properties:
        fromSequence:
          type: integer
          minimum: 1
          description: Start verification from this sequence number
        toSequence:
          type: integer
          description: End verification at this sequence number
        claimId:
          type: string
          format: uuid
          description: Optionally scope verification to a specific claim

    IntegrityVerificationResponse:
      type: object
      properties:
        verified:
          type: boolean
          description: True if the entire range is tamper-free
        entriesChecked:
          type: integer
        firstSequence:
          type: integer
        lastSequence:
          type: integer
        brokenAt:
          type: integer
          nullable: true
          description: Sequence number where chain break was detected (null if intact)
        verifiedAt:
          type: string
          format: date-time

    EntryHashResponse:
      type: object
      properties:
        entryId:
          type: string
          format: uuid
        sequenceNumber:
          type: integer
        hash:
          type: string
          description: SHA-256 hash of this entry
        previousHash:
          type: string
          nullable: true
        algorithm:
          type: string
          enum: [sha256]

    ServiceHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        uptime:
          type: number
        dependencies:
          type: object
          additionalProperties:
            type: string

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
