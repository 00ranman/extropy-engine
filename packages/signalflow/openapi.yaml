openapi: 3.1.0
info:
  title: SignalFlow Orchestrator API
  description: |
    Routes validation tasks to human and AI validators based on
    complexity scores. Manages task queues, assignment, and completion tracking.
    
    Validators connect via WebSocket to receive real-time task notifications.
  version: 1.0.0
  contact:
    name: Extropy Engine

servers:
  - url: http://localhost:4003
    description: Local development
  - url: https://api.extropy.engine/signalflow
    description: Production

tags:
  - name: Tasks
    description: Validation task lifecycle management
  - name: Metrics
    description: Queue depth and performance metrics
  - name: Health
    description: Service health checks

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceHealthResponse'

  /tasks:
    post:
      tags: [Tasks]
      operationId: createTask
      summary: Create a new validation task
      description: |
        Creates a task and routes it to the appropriate validator type
        based on the complexity score.
        
        Routing rules:
        - complexityScore >= 0.9 → consensus (human + AI)
        - complexityScore >= 0.7 → human validator
        - complexityScore < 0.7 → AI validator
        
        Emits: `task:new` via WebSocket to the validator room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    get:
      tags: [Tasks]
      operationId: listTasks
      summary: List all validation tasks
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: validatorType
          in: query
          schema:
            $ref: '#/components/schemas/ValidatorType'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      operationId: getTask
      summary: Get a specific task
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{taskId}/claim:
    post:
      tags: [Tasks]
      operationId: claimTask
      summary: Claim a task for validation
      description: |
        A validator claims a pending task, moving it to `assigned` status.
        Once claimed, a deadline is set (default 1 hour).
        
        Emits: `task:claimed` via WebSocket
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimTaskRequest'
      responses:
        '200':
          description: Task claimed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /tasks/{taskId}/result:
    post:
      tags: [Tasks]
      operationId: submitResult
      summary: Submit validation result
      description: |
        Submit the verdict for a claimed task.
        
        Emits: `task:completed` via WebSocket to all connected clients
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitResultRequest'
      responses:
        '200':
          description: Result recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    get:
      tags: [Tasks]
      operationId: getResult
      summary: Get task result
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResultResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /metrics/queues:
    get:
      tags: [Metrics]
      operationId: getQueueMetrics
      summary: Get queue depth metrics
      responses:
        '200':
          description: Queue depths by validator type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueMetricsResponse'

components:
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Task already claimed or completed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Semantic validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    TaskStatus:
      type: string
      enum: [pending, assigned, in_progress, completed, failed, expired]

    ValidatorType:
      type: string
      enum: [human, ai, consensus]

    TaskPriority:
      type: string
      enum: [low, medium, high, critical]

    CreateTaskRequest:
      type: object
      required: [subClaimId, claimId, text, complexityScore]
      properties:
        subClaimId:
          type: string
          format: uuid
        claimId:
          type: string
          format: uuid
        text:
          type: string
          minLength: 1
          maxLength: 10000
          description: The sub-claim text to validate
        complexityScore:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Determines routing (0=simple/AI, 1=complex/human)
        priority:
          $ref: '#/components/schemas/TaskPriority'
        deadline:
          type: string
          format: date-time
          description: Optional hard deadline for completion

    TaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subClaimId:
          type: string
          format: uuid
        claimId:
          type: string
          format: uuid
        text:
          type: string
        validatorType:
          $ref: '#/components/schemas/ValidatorType'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        status:
          $ref: '#/components/schemas/TaskStatus'
        assignedTo:
          type: string
          format: uuid
          nullable: true
        complexityScore:
          type: number
          format: float
        deadline:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskResponse'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ClaimTaskRequest:
      type: object
      required: [validatorId]
      properties:
        validatorId:
          type: string
          format: uuid

    SubmitResultRequest:
      type: object
      required: [validatorId, verdict, confidence]
      properties:
        validatorId:
          type: string
          format: uuid
        verdict:
          type: string
          enum: [true, false, uncertain]
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        evidence:
          type: string
          maxLength: 5000

    TaskResultResponse:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
        validatorId:
          type: string
          format: uuid
        verdict:
          type: string
          enum: [true, false, uncertain]
        confidence:
          type: number
          format: float
        evidence:
          type: string
          nullable: true
        completedAt:
          type: string
          format: date-time

    QueueMetricsResponse:
      type: object
      properties:
        human:
          type: integer
          description: Tasks waiting for human validators
        ai:
          type: integer
          description: Tasks waiting for AI validators
        consensus:
          type: integer
          description: Tasks waiting for consensus validation
        total:
          type: integer
          description: Total pending tasks across all queues

    ServiceHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        uptime:
          type: number
        dependencies:
          type: object
          additionalProperties:
            type: string

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
