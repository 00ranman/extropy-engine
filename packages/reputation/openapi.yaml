openapi: 3.1.0
info:
  title: Reputation Service API
  description: |
    Computes validator reputation as compressed evidence of past verification
    accuracy. Reputation feeds back into SignalFlow routing weights and the
    XP mint formula's R factor.
    
    Reputation dynamics:
      Accrual:  R_i(t+1) = R_i(t) + α · XP_t
      Decay:    R_i(t)   = R_i(t-1) · (1 - γ)
      Penalty:  R_i(t)   = R_i(t) - penalty (adversarial behavior)
  version: 1.0.0

servers:
  - url: http://localhost:4004
    description: Local development
  - url: https://api.extropy.engine/reputation
    description: Production

tags:
  - name: Validators
    description: Validator registration and profile management
  - name: Reputation
    description: Reputation scoring, history, and leaderboards
  - name: Decay
    description: Reputation decay operations
  - name: Health
    description: Service health checks

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceHealthResponse'

  /validators:
    post:
      tags: [Validators]
      operationId: registerValidator
      summary: Register a new validator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterValidatorRequest'
      responses:
        '201':
          description: Validator registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Validator'
        '409':
          description: Validator already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Validators]
      operationId: listValidators
      summary: List all validators with reputation data
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: domain
          in: query
          schema:
            $ref: '#/components/schemas/EntropyDomain'
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [reputation_desc, reputation_asc, accuracy_desc, xp_desc]
            default: reputation_desc
      responses:
        '200':
          description: Paginated list of validators
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedValidators'

  /validators/{validatorId}:
    get:
      tags: [Validators]
      operationId: getValidator
      summary: Get a specific validator with full reputation detail
      parameters:
        - $ref: '#/components/parameters/ValidatorIdParam'
      responses:
        '200':
          description: Validator detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Validator'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Validators]
      operationId: updateValidator
      summary: Update validator profile (name, domains, capacity)
      parameters:
        - $ref: '#/components/parameters/ValidatorIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateValidatorRequest'
      responses:
        '200':
          description: Validator updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Validator'
        '404':
          $ref: '#/components/responses/NotFound'

  /validators/{validatorId}/reputation:
    get:
      tags: [Reputation]
      operationId: getReputation
      summary: Get current reputation score for a validator
      parameters:
        - $ref: '#/components/parameters/ValidatorIdParam'
      responses:
        '200':
          description: Current reputation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReputationScore'
        '404':
          $ref: '#/components/responses/NotFound'

  /validators/{validatorId}/reputation/history:
    get:
      tags: [Reputation]
      operationId: getReputationHistory
      summary: Get reputation change history for a validator
      parameters:
        - $ref: '#/components/parameters/ValidatorIdParam'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: eventType
          in: query
          schema:
            type: string
            enum: [accrual, decay, penalty, bonus]
      responses:
        '200':
          description: Reputation history
          content:
            application/json:
              schema:
                type: object
                properties:
                  validatorId: { type: string }
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReputationEvent'

  /reputation/accrue:
    post:
      tags: [Reputation]
      operationId: accrueReputation
      summary: Accrue reputation for a validator after successful validation
      description: |
        Called when a loop closes and XP is minted. Applies the formula:
        R_i(t+1) = R_i(t) + α · XP_t
        
        Emits: `reputation.accrued`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccrueReputationRequest'
      responses:
        '200':
          description: Updated validator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Validator'
        '404':
          $ref: '#/components/responses/NotFound'

  /reputation/penalize:
    post:
      tags: [Reputation]
      operationId: penalizeReputation
      summary: Apply a reputation penalty for adversarial behavior
      description: |
        Applies the formula: R_i(t) = R_i(t) - penalty
        Resets the validator's streak to 0.
        
        Emits: `reputation.penalized`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PenalizeReputationRequest'
      responses:
        '200':
          description: Updated validator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Validator'
        '404':
          $ref: '#/components/responses/NotFound'

  /reputation/decay:
    post:
      tags: [Decay]
      operationId: applyDecay
      summary: Apply reputation decay to inactive validators
      description: |
        Applies the formula: R_i(t) = R_i(t-1) · (1 - γ)
        to all validators inactive for more than `thresholdHours`.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                thresholdHours:
                  type: integer
                  default: 24
      responses:
        '200':
          description: Decay applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  affectedValidators: { type: integer }

  /reputation/bulk:
    post:
      tags: [Reputation]
      operationId: getBulkReputation
      summary: Get reputation scores for multiple validators in one call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [validatorIds]
              properties:
                validatorIds:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Map of validatorId to reputation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/ReputationScore'

  /reputation/leaderboard:
    get:
      tags: [Reputation]
      operationId: getLeaderboard
      summary: Get top validators by aggregate reputation
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Validator'

  /events:
    post:
      tags: [Reputation]
      operationId: handleEvent
      summary: Internal event handler (loop.closed → accrue)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainEvent'
      responses:
        '202':
          description: Event accepted

components:
  parameters:
    ValidatorIdParam:
      name: validatorId
      in: path
      required: true
      schema: { type: string }
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    PageSizeParam:
      name: pageSize
      in: query
      schema: { type: integer, default: 20 }

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    EntropyDomain:
      type: string
      enum: [cognitive, code, social, economic, thermodynamic, informational]

    ValidatorType:
      type: string
      enum: [human, ai, hybrid, oracle]

    Validator:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { $ref: '#/components/schemas/ValidatorType' }
        domains:
          type: array
          items: { $ref: '#/components/schemas/EntropyDomain' }
        aggregateReputation: { type: number }
        reputationByDomain:
          type: object
          additionalProperties: { type: number }
        accrualRate: { type: number }
        decayRate: { type: number }
        currentStreak: { type: integer }
        penaltyCount: { type: integer }
        totalXpEarned: { type: number }
        loopsParticipated: { type: integer }
        accurateValidations: { type: integer }
        currentTaskCount: { type: integer }
        maxConcurrentTasks: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        lastActiveAt: { type: string, format: date-time }

    ReputationScore:
      type: object
      properties:
        aggregate: { type: number }
        byDomain:
          type: object
          additionalProperties: { type: number }
        accrualRate: { type: number }
        decayRate: { type: number }
        currentStreak: { type: integer }
        penaltyCount: { type: integer }
        lastUpdatedAt: { type: string, format: date-time }

    ReputationEvent:
      type: object
      properties:
        id: { type: string }
        validatorId: { type: string }
        type:
          type: string
          enum: [accrual, decay, penalty, bonus]
        domain: { $ref: '#/components/schemas/EntropyDomain' }
        delta: { type: number }
        reason: { type: string }
        relatedLoopId: { type: string }
        timestamp: { type: string, format: date-time }

    RegisterValidatorRequest:
      type: object
      required: [name, type, domains]
      properties:
        name: { type: string }
        type: { $ref: '#/components/schemas/ValidatorType' }
        domains:
          type: array
          items: { $ref: '#/components/schemas/EntropyDomain' }
        maxConcurrentTasks: { type: integer, default: 5 }

    UpdateValidatorRequest:
      type: object
      properties:
        name: { type: string }
        isActive: { type: boolean }
        domains:
          type: array
          items: { $ref: '#/components/schemas/EntropyDomain' }
        maxConcurrentTasks: { type: integer }

    AccrueReputationRequest:
      type: object
      required: [validatorId, domain, xpEarned, loopId]
      properties:
        validatorId: { type: string }
        domain: { $ref: '#/components/schemas/EntropyDomain' }
        xpEarned: { type: number }
        loopId: { type: string }

    PenalizeReputationRequest:
      type: object
      required: [validatorId, domain, penalty, reason]
      properties:
        validatorId: { type: string }
        domain: { $ref: '#/components/schemas/EntropyDomain' }
        penalty: { type: number }
        reason: { type: string }
        loopId: { type: string }

    PaginatedValidators:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Validator' }
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    ServiceHealthResponse:
      type: object
      properties:
        service: { type: string }
        status: { type: string }
        version: { type: string }
        uptime: { type: number }
        timestamp: { type: string, format: date-time }
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum: [connected, disconnected]

    DomainEvent:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        payload: { type: object }

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
        code: { type: string }
        timestamp: { type: string, format: date-time }
