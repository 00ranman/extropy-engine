openapi: 3.1.0
info:
  title: XP Mint API
  description: |
    Mints XP tokens after loop closure. XP is a function of entropy reduction
    (ΔS), validator reputation (R), and domain difficulty (D):

      XP = ΔS · R · D

    Each minted XP is stored as an immutable ledger entry.
  version: 1.0.0

servers:
  - url: http://localhost:4005
    description: Local development
  - url: https://api.extropy.engine/xp-mint
    description: Production

tags:
  - name: XP
    description: XP minting and ledger operations
  - name: Balances
    description: Validator XP balance queries
  - name: Health
    description: Service health checks

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceHealthResponse'

  /xp/mint:
    post:
      tags: [XP]
      operationId: mintXP
      summary: Mint XP for a validator after loop closure
      description: |
        Mints XP using the formula: XP = ΔS · R · D
        
        - ΔS = entropy reduction (deltaS)
        - R = validator aggregate reputation
        - D = domain difficulty multiplier
        
        Emits: `xp.minted`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MintXPRequest'
      responses:
        '201':
          description: XP minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XPEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /xp/mint/bulk:
    post:
      tags: [XP]
      operationId: mintXPBulk
      summary: Mint XP for multiple validators at once
      description: |
        Batch minting for all validators in a closed loop.
        Emits: `xp.minted` for each validator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkMintRequest'
      responses:
        '201':
          description: XP minted for all validators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/XPEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /xp/ledger:
    get:
      tags: [XP]
      operationId: getLedger
      summary: Get XP ledger entries
      parameters:
        - name: validatorId
          in: query
          schema: { type: string }
        - name: loopId
          in: query
          schema: { type: string }
        - name: domain
          in: query
          schema:
            $ref: '#/components/schemas/EntropyDomain'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: XP ledger entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedXPEntries'

  /xp/ledger/{entryId}:
    get:
      tags: [XP]
      operationId: getLedgerEntry
      summary: Get a specific XP ledger entry
      parameters:
        - name: entryId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: XP ledger entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XPEntry'
        '404':
          $ref: '#/components/responses/NotFound'

  /balances/{validatorId}:
    get:
      tags: [Balances]
      operationId: getBalance
      summary: Get XP balance for a validator
      parameters:
        - name: validatorId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: XP balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XPBalance'
        '404':
          $ref: '#/components/responses/NotFound'

  /balances/bulk:
    post:
      tags: [Balances]
      operationId: getBulkBalances
      summary: Get XP balances for multiple validators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [validatorIds]
              properties:
                validatorIds:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Map of validatorId to XP balance
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/XPBalance'

  /leaderboard:
    get:
      tags: [Balances]
      operationId: getLeaderboard
      summary: Get top XP holders
      parameters:
        - name: domain
          in: query
          schema:
            $ref: '#/components/schemas/EntropyDomain'
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: XP leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/XPBalance'

  /events:
    post:
      tags: [XP]
      operationId: handleEvent
      summary: Internal event handler (loop.closed → mint)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainEvent'
      responses:
        '202':
          description: Event accepted

components:
  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    PageSizeParam:
      name: pageSize
      in: query
      schema: { type: integer, default: 20 }

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    EntropyDomain:
      type: string
      enum: [cognitive, code, social, economic, thermodynamic, informational]

    DomainDifficulty:
      type: number
      description: Difficulty multiplier for a domain (e.g. 1.0 for cognitive, 1.5 for thermodynamic)

    MintXPRequest:
      type: object
      required: [validatorId, loopId, domain, deltaS, reputation]
      properties:
        validatorId: { type: string }
        loopId: { type: string }
        domain: { $ref: '#/components/schemas/EntropyDomain' }
        deltaS:
          type: number
          description: Entropy reduction achieved by closing the loop
        reputation:
          type: number
          description: Validator's aggregate reputation at time of minting
        domainDifficulty:
          type: number
          description: Optional difficulty override (defaults to domain table)

    BulkMintRequest:
      type: object
      required: [loopId, domain, deltaS, validators]
      properties:
        loopId: { type: string }
        domain: { $ref: '#/components/schemas/EntropyDomain' }
        deltaS: { type: number }
        validators:
          type: array
          items:
            type: object
            required: [validatorId, reputation]
            properties:
              validatorId: { type: string }
              reputation: { type: number }

    XPEntry:
      type: object
      properties:
        id: { type: string }
        validatorId: { type: string }
        loopId: { type: string }
        domain: { $ref: '#/components/schemas/EntropyDomain' }
        deltaS: { type: number }
        reputation: { type: number }
        domainDifficulty: { type: number }
        xpMinted: { type: number }
        mintedAt: { type: string, format: date-time }

    XPBalance:
      type: object
      properties:
        validatorId: { type: string }
        totalXP: { type: number }
        xpByDomain:
          type: object
          additionalProperties: { type: number }
        entryCount: { type: integer }
        lastMintedAt: { type: string, format: date-time, nullable: true }

    PaginatedXPEntries:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/XPEntry' }
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    ServiceHealthResponse:
      type: object
      properties:
        service: { type: string }
        status: { type: string }
        version: { type: string }
        uptime: { type: number }
        timestamp: { type: string, format: date-time }
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum: [connected, disconnected]

    DomainEvent:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        payload: { type: object }

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
        code: { type: string }
        timestamp: { type: string, format: date-time }
