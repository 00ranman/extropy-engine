openapi: 3.1.0
info:
  title: XP Mint Service API
  description: |
    Mints Experience Points (XP) for validators when verification loops close.
    XP is the native unit of value in the Extropy Engine, denominated in entropy
    reduction (ΔS) and modulated by causal closure speed, truth score, and
    validator reputation.
    
    Mint formula:
      XP = ΔS · c_L · T · R · B
      where:
        ΔS  = entropy reduction achieved by the loop
        c_L = causal closure speed for the loop's domain
        T   = truth score from epistemology engine (0-1)
        R   = validator reputation weight
        B   = base multiplier (default 1000)
    
    Minting is two-phase:
      1. Provisional mint on loop.closed — XP held in escrow
      2. Final mint on loop.settled    — XP released to validators
  version: 1.0.0

servers:
  - url: http://localhost:4005
    description: Local development
  - url: https://api.extropy.engine/xp-mint
    description: Production

tags:
  - name: Mint
    description: XP minting operations
  - name: Balances
    description: XP balance management
  - name: History
    description: Mint event history
  - name: Health
    description: Service health checks

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceHealthResponse'

  /mint/provisional:
    post:
      tags: [Mint]
      operationId: mintProvisional
      summary: Create a provisional XP mint when a loop closes
      description: |
        Triggered by loop.closed events. Creates an escrow entry.
        XP is not yet credited to validators.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionalMintRequest'
      responses:
        '201':
          description: Provisional mint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MintEvent'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /mint/final:
    post:
      tags: [Mint]
      operationId: mintFinal
      summary: Finalize a provisional mint when a loop settles
      description: |
        Triggered by loop.settled events. Releases escrowed XP to validators.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalMintRequest'
      responses:
        '200':
          description: Mint finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MintEvent'
        '404':
          $ref: '#/components/responses/NotFound'

  /mint/events:
    get:
      tags: [History]
      operationId: listMintEvents
      summary: List all mint events
      parameters:
        - name: loopId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [provisional, final, voided]
        - name: validatorId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated mint events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMintEvents'

  /mint/events/{mintEventId}:
    get:
      tags: [History]
      operationId: getMintEvent
      summary: Get a specific mint event
      parameters:
        - $ref: '#/components/parameters/MintEventIdParam'
      responses:
        '200':
          description: Mint event detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MintEvent'
        '404':
          $ref: '#/components/responses/NotFound'

  /balances/{validatorId}:
    get:
      tags: [Balances]
      operationId: getBalance
      summary: Get XP balance for a validator
      parameters:
        - $ref: '#/components/parameters/ValidatorIdParam'
      responses:
        '200':
          description: Current XP balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XPBalance'
        '404':
          $ref: '#/components/responses/NotFound'

  /balances/{validatorId}/history:
    get:
      tags: [Balances]
      operationId: getBalanceHistory
      summary: Get XP balance history for a validator
      parameters:
        - $ref: '#/components/parameters/ValidatorIdParam'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Balance history
          content:
            application/json:
              schema:
                type: object
                properties:
                  validatorId: { type: string }
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/BalanceHistoryEntry'

  /events:
    post:
      tags: [Health]
      operationId: receiveEvent
      summary: Receive domain events (internal service-to-service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainEvent'
      responses:
        '202':
          description: Event accepted

components:
  parameters:
    ValidatorIdParam:
      name: validatorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MintEventIdParam:
      name: mintEventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ValidatorId:
      type: string
      format: uuid
    
    MintEventId:
      type: string
      format: uuid

    MintStatus:
      type: string
      enum: [provisional, final, voided]

    MintEvent:
      type: object
      required: [id, loopId, status, deltaS, causalClosureSpeed, truthScore, totalXP, validatorAllocations, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/MintEventId'
        loopId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/MintStatus'
        deltaS:
          type: number
          format: float
          description: Entropy reduction used in formula
        causalClosureSpeed:
          type: number
          format: float
          description: c_L value for the loop domain
        truthScore:
          type: number
          format: float
          description: T value from epistemology engine
        reputationWeight:
          type: number
          format: float
          description: Aggregate R value used in mint
        baseMultiplier:
          type: number
          format: float
          default: 1000
        totalXP:
          type: number
          format: float
          description: Total XP minted (sum across validators)
        validatorAllocations:
          type: array
          items:
            $ref: '#/components/schemas/ValidatorAllocation'
        finalizedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    ValidatorAllocation:
      type: object
      required: [validatorId, xpAllocated, reputationWeight]
      properties:
        validatorId:
          $ref: '#/components/schemas/ValidatorId'
        xpAllocated:
          type: number
          format: float
        reputationWeight:
          type: number
          format: float
        status:
          $ref: '#/components/schemas/MintStatus'

    ProvisionalMintRequest:
      type: object
      required: [loopId, deltaS, causalClosureSpeed, validatorIds]
      properties:
        loopId:
          type: string
          format: uuid
        deltaS:
          type: number
          format: float
        causalClosureSpeed:
          type: number
          format: float
        truthScore:
          type: number
          format: float
          default: 1.0
        reputationWeights:
          type: object
          additionalProperties:
            type: number
          description: Map of validatorId → reputation weight
        validatorIds:
          type: array
          items:
            $ref: '#/components/schemas/ValidatorId'
        baseMultiplier:
          type: number
          format: float
          default: 1000

    FinalMintRequest:
      type: object
      required: [mintEventId]
      properties:
        mintEventId:
          $ref: '#/components/schemas/MintEventId'
        loopId:
          type: string
          format: uuid

    XPBalance:
      type: object
      required: [validatorId, provisional, confirmed, total]
      properties:
        validatorId:
          $ref: '#/components/schemas/ValidatorId'
        provisional:
          type: number
          format: float
          description: XP in escrow (not yet finalized)
        confirmed:
          type: number
          format: float
          description: Finalized and credited XP
        total:
          type: number
          format: float
          description: provisional + confirmed
        lastUpdated:
          type: string
          format: date-time

    BalanceHistoryEntry:
      type: object
      properties:
        mintEventId:
          $ref: '#/components/schemas/MintEventId'
        loopId:
          type: string
          format: uuid
        xpAmount:
          type: number
          format: float
        status:
          $ref: '#/components/schemas/MintStatus'
        timestamp:
          type: string
          format: date-time

    PaginatedMintEvents:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MintEvent'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    ServiceHealthResponse:
      type: object
      required: [service, status, version, uptime, timestamp]
      properties:
        service:
          type: string
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        uptime:
          type: number
        timestamp:
          type: string
          format: date-time
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum: [connected, disconnected]

    ErrorResponse:
      type: object
      required: [error, code, timestamp]
      properties:
        error:
          type: string
        code:
          type: string
        timestamp:
          type: string
          format: date-time

    DomainEvent:
      type: object
      required: [id, type, correlationId, payload, timestamp, source]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        correlationId:
          type: string
        payload:
          type: object
        timestamp:
          type: string
          format: date-time
        source:
          type: string
